    <main>
        <section id="login-container">
    <div class="login-box">
        <input type="radio" name="pestana" id="radio-login" checked>
        <input type="radio" name="pestana" id="radio-registro">

        <div class="tabs-header">
            <label for="radio-login" class="tab-label">Login</label>
            <label for="radio-registro" class="tab-label">Registro</label>
        </div>

        <div class="forms-container">
            <form id="login-form" class="auth-form" action="#" method="POST">
                <div class="input-group">
                    <label>Correo Electrónico</label>
                    <input type="email" name="usuario" placeholder="tucorreo@correo.com" required>
                </div>
                <div class="input-group">
                    <label>Contraseña</label>
                    <input type="password" name="contrasena" placeholder="Tu contraseña" required>
                </div>
                <button type="submit" class="main-btn">Iniciar Sesión</button>
                <a href="#" class="forgot-link">¿Olvidaste tu contraseña?</a>
            </form>

            <form id="register-form" class="auth-form" action="#" method="POST">
                <div class="input-group">
                    <label>Nombre Completo</label>
                    <input type="text" name="nombre" placeholder="Ingresa tu nombre" required>
                </div>
                <div class="input-group">
                    <label>Correo Electrónico</label>
                    <input type="email" name="usuario" placeholder="tucorreo@correo.com" required>
                </div>
                <div class="input-group">
                    <label>Contraseña</label>
                    <input type="password" name="contrasena" placeholder="Crea una clave" required>
                </div>
                <button type="submit" class="main-btn">Crear Cuenta</button>
            </form>
        </div>
    </div>
</section>
