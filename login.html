<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Eat and Bite ¡Vive saludable!</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <header>
        <img src="img/eatandbite_temp.png" alt="eatandbite" width="100px">
        <nav>
            <a href="index.html">Inicio</a>
            <a href="#nosotros">Nosotros</a> <a href="#productos">Productos</a>
            <a href="#galeria">Galería</a>
            <a href="reseña.html">Reseñas</a>
            <a href="contacto.html">Contacto</a>
            <a href="login.html" class="login">Login</a>
        </nav>
    </header>
    <main>
        <section id="login-container">
    <div class="login-box">
        <input type="radio" name="pestana" id="radio-login" checked>
        <input type="radio" name="pestana" id="radio-registro">

        <div class="tabs-header">
            <label for="radio-login" class="tab-label">Login</label>
            <label for="radio-registro" class="tab-label">Registro</label>
        </div>

        <div class="forms-container">
            <form id="login-form" class="auth-form" action="#" method="POST">
                <div class="input-group">
                    <label>Correo Electrónico</label>
                    <input type="email" name="usuario" placeholder="tucorreo@correo.com" required>
                </div>
                <div class="input-group">
                    <label>Contraseña</label>
                    <input type="password" name="contrasena" placeholder="Tu contraseña" required>
                </div>
                <button type="submit" class="main-btn">Iniciar Sesión</button>
                <a href="#" class="forgot-link">¿Olvidaste tu contraseña?</a>
            </form>

            <form id="register-form" class="auth-form" action="#" method="POST">
                <div class="input-group">
                    <label>Nombre Completo</label>
                    <input type="text" name="nombre" placeholder="Ingresa tu nombre" required>
                </div>
                <div class="input-group">
                    <label>Correo Electrónico</label>
                    <input type="email" name="usuario" placeholder="tucorreo@correo.com" required>
                </div>
                <div class="input-group">
                    <label>Contraseña</label>
                    <input type="password" name="contrasena" placeholder="Crea una clave" required>
                </div>
                <button type="submit" class="main-btn">Crear Cuenta</button>
            </form>
        </div>
    </div>
</section>
   
    </main>

                <img src="https://img.icons8.com/color/48/instagram-new--v1.png" alt="Instagram">
            </a>
            <a href="https://facebook.com/eatandbite" target="_blank" class="social-icon">
                <img src="https://img.icons8.com/color/48/facebook-new.png" alt="Facebook">
            </a>
        </div>
    </div>
</footer>

</body>
</html>
