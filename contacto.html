<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Eat and Bite ¡Vive saludable!</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <header>
        <img src="img/eatandbite_temp.png" alt="eatandbite" width="100px">
        <nav>
            <a href="#inicio">Inicio</a> 
            <a href="#nosotros">Nosotros</a>
            <a href="#productos">Productos</a>
            <a href="#galeria">Galeria</a>
            <a href="#reseñas">Reseñas</a> 
            <a href="#contacto">Contacto</a>
        </nav>
    </header>
    <main>
       
       <section id="contacto">
    <form action="" method="post" class="form-container">
        <h2>Contacto</h2>

        <div class="form-group">
            <label for="nombre">Nombre completo</label>
            <input type="text" id="nombre" name="nombre" placeholder="Escriba su nombre" required>
        </div>

        <div class="form-group">
            <label for="telefono">Número de teléfono</label>
            <input type="tel" id="telefono" name="telefono" placeholder="Escriba su número" required>
        </div>

        <div class="form-group">
            <label for="Correo">Correo electrónico</label>
            <input type="email" id="Correo" name="Correo" placeholder="ejemplo@correo.com" required>
        </div>

        <div class="form-group">
            <label for="Mensaje">Comentarios</label>
            <textarea name="Mensaje" id="Mensaje" placeholder="¿En qué podemos ayudarte?" required></textarea>
        </div>

        <div class="form-buttons">
            <button type="submit" class="btn-submit">Enviar</button>
            <button type="reset" class="btn-reset">Limpiar</button>
        </div>
    </form>
</section>
    </main>
</body>
</html>
